{% extends 'base.html' %}
{% block title %}Přihlášení{% endblock %}
{% block content %}
<section class="container py-5"><div class="auth-card mx-auto">
<h1 class="h2 mb-4">Přihlášení</h1>
<form method="post" class="row g-3">
<div class="col-12"><label class="form-label">E-mail</label><input class="form-control" type="email" name="email" required></div>
<div class="col-12"><label class="form-label">Heslo</label><input class="form-control" type="password" name="password" required></div>
<div class="col-12"><button class="btn btn-dark w-100 rounded-pill">Přihlásit se</button></div>
<p class="text-secondary mb-0">Nemáš účet? <a href="{{ url_for('auth.register') }}">Registruj se</a> • <a href="{{ url_for('auth.forgot_password') }}">Zapomenuté heslo</a></p>
</form></div></section>
{% endblock %}
