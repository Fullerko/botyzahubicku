{% extends 'base.html' %}
{% block title %}Reset hesla{% endblock %}
{% block content %}
<section class="container py-5"><div class="auth-card mx-auto">
<h1 class="h2 mb-4">Reset hesla přes e-mail</h1>
<form method="post" class="row g-3">
<div class="col-12"><label class="form-label">E-mail</label><input class="form-control" type="email" name="email" required></div>
<div class="col-12"><button class="btn btn-dark w-100 rounded-pill">Poslat odkaz</button></div>
</form></div></section>
{% endblock %}
