{% extends 'base.html' %}
{% block title %}Registrace{% endblock %}
{% block content %}
<section class="container py-5"><div class="auth-card mx-auto">
<h1 class="h2 mb-4">Registrace</h1>
<form method="post" class="row g-3">
<div class="col-md-6"><label class="form-label">Jméno a příjmení</label><input class="form-control" name="full_name" required></div>
<div class="col-md-6"><label class="form-label">E-mail</label><input class="form-control" type="email" name="email" required></div>
<div class="col-md-6"><label class="form-label">Heslo</label><input class="form-control" type="password" name="password" required></div>
<div class="col-md-6"><label class="form-label">PSČ</label><input class="form-control" name="postal_code"></div>
<div class="col-12"><label class="form-label">Adresa</label><input class="form-control" name="address"></div>
<div class="col-md-6"><label class="form-label">Město</label><input class="form-control" name="city"></div>
<div class="col-12"><button class="btn btn-dark w-100 rounded-pill">Vytvořit účet</button></div>
</form></div></section>
{% endblock %}
