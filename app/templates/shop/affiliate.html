{% extends 'base.html' %}
{% block title %}Affiliate program | {{ settings.get('site_name', 'BotyZaHubicku.cz') }}{% endblock %}
{% block content %}
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7 col-xl-6">
      <div class="info-card">
        <h1 class="h2 fw-bold mb-2">Přihláška do affiliate programu</h1>
        <p class="text-secondary mb-4">Vyplňte krátkou přihlášku. Po schválení vám vytvoříme přístup do affiliate portálu.</p>

        <form method="post" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Jméno</label>
            <input class="form-control" name="name" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">E-mail</label>
            <input class="form-control" type="email" name="email" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Instagram / kontakt</label>
            <input class="form-control" name="instagram">
          </div>
          <div class="col-12">
            <label class="form-label">Poznámka</label>
            <textarea class="form-control" name="note" rows="4"></textarea>
          </div>
          <div class="col-12 d-flex justify-content-between align-items-center gap-3 flex-wrap">
            <button class="btn btn-dark rounded-pill px-4">Odeslat žádost</button>
            <a class="btn btn-outline-dark rounded-pill px-4" href="{{ url_for('shop.affiliate_portal') }}">Affiliate portál</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
