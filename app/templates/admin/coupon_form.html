{% extends 'base.html' %}
{% block title %}Slevový kód{% endblock %}
{% block content %}
<section class="container py-5"><div class="info-card"><h1 class="h2 mb-4">{{ 'Upravit kód' if coupon else 'Nový kód' }}</h1><form method="post" class="row g-3"><div class="col-md-4"><label class="form-label">Kód</label><input class="form-control" name="code" value="{{ coupon.code if coupon else '' }}" required></div><div class="col-md-4"><label class="form-label">Label</label><input class="form-control" name="label" value="{{ coupon.label if coupon else '' }}"></div><div class="col-md-4"><label class="form-label">Partner</label><select class="form-select" name="affiliate_partner_id"><option value="">Bez partnera</option>{% for p in partners %}<option value="{{ p.id }}" {% if coupon and coupon.affiliate_partner_id == p.id %}selected{% endif %}>{{ p.name }}</option>{% endfor %}</select></div><div class="col-md-6"><label class="form-label">Sleva pro klienta (%)</label><input class="form-control" type="number" step="0.01" name="discount_percent_client" value="{{ coupon.discount_percent_client if coupon else 0 }}"></div><div class="col-md-6"><label class="form-label">Provize partnera (%)</label><input class="form-control" type="number" step="0.01" name="commission_percent_partner" value="{{ coupon.commission_percent_partner if coupon else 0 }}"></div><div class="col-md-6"><label class="form-label">Max použití (0 = neomezeně)</label><input class="form-control" type="number" name="max_uses" value="{{ coupon.max_uses if coupon else 0 }}"></div><div class="col-md-6 form-check ms-3 mt-5"><input class="form-check-input" type="checkbox" name="active" {% if not coupon or coupon.active %}checked{% endif %}><label class="form-check-label">Aktivní kód</label></div><div class="col-12"><label class="form-label">Popis</label><textarea class="form-control" name="description" rows="4">{{ coupon.description if coupon else '' }}</textarea></div><div class="col-12"><button class="btn btn-dark rounded-pill px-4">Uložit</button></div></form></div></section>
{% endblock %}
