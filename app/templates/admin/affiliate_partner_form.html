{% extends 'base.html' %}
{% block title %} partner{% endblock %}
{% block content %}
<section class="container py-5"><div class="info-card"><h1 class="h2 mb-4">{{ 'Upravit partnera' if partner else 'Nový partner' }}</h1><form method="post" class="row g-3"><div class="col-md-6"><label class="form-label">Jméno</label><input class="form-control" name="name" value="{{ partner.name if partner else '' }}" required></div><div class="col-md-6"><label class="form-label">E-mail</label><input class="form-control" name="email" type="email" value="{{ partner.email if partner else '' }}" required></div><div class="col-md-6"><label class="form-label">Instagram / kontakt</label><input class="form-control" name="instagram" value="{{ partner.instagram if partner else '' }}"></div><div class="col-md-6"><label class="form-label">Status</label><input class="form-control" name="status" value="{{ partner.status if partner else 'Aktivní' }}"></div><div class="col-12"><label class="form-label">Poznámka</label><textarea class="form-control" name="note" rows="5">{{ partner.note if partner else '' }}</textarea></div>{% if partner %}<div class="col-md-4"><label class="form-label">Vyplatit částku</label><input class="form-control" name="pay_amount" type="number" step="0.01" placeholder="0"></div>{% endif %}<div class="col-12"><button class="btn btn-dark rounded-pill px-4">Uložit</button></div></form></div></section>
{% endblock %}
